<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Success Program</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; overflow-x: hidden; }
        .bold-card { background: #ffffff; border: 2px solid #0f172a; border-radius: 16px; box-shadow: 4px 4px 0px #0f172a; position: relative; }
        .tab-btn { border: 2px solid #0f172a; border-radius: 10px; font-weight: 800; font-size: 11px; transition: 0.2s; }
        .tab-btn.active { background: #0f172a; color: #ffffff; box-shadow: 3px 3px 0px #3b82f6; }
        .stage-col { background: #f8fafc; border: 2px solid #0f172a; border-radius: 20px; padding: 12px; min-height: 75vh; }
        .compact-card { background: #ffffff; border: 1.5px solid #0f172a; border-radius: 10px; box-shadow: 2px 2px 0px #0f172a; cursor: grab; padding: 10px; margin-bottom: 10px; position: relative; }
        .service-tag { font-size: 8px; font-weight: 800; padding: 2px 8px; border-radius: 4px; background: #0f172a; color: white; text-transform: uppercase; }
        .result-line { border-left: 4px solid #10b981; padding: 6px 12px; background: #f0fdf4; border-radius: 0 10px 10px 0; margin-bottom: 6px; font-size: 13px; font-weight: 700; font-style: italic; border: 1px solid #d1fae5; }
        [contenteditable="true"]:focus { outline: 2px solid #2563eb; background: #f0f7ff; padding: 2px; border-radius: 4px; }
        .btn-del { position: absolute; top: 5px; right: 5px; opacity: 0; transition: 0.2s; color: #ef4444; font-size: 10px; font-weight: bold; cursor: pointer; }
        .bold-card:hover .btn-del, .compact-card:hover .btn-del { opacity: 1; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #0f172a; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div class="max-w-[1750px] mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-3xl font-black tracking-tighter uppercase italic text-slate-900">Customer Success <span class="text-blue-600">Program</span></h1>
            
            <nav class="flex gap-2 bg-slate-50 p-1 rounded-xl border-2 border-slate-900">
                <button onclick="switchTab('overview')" id="btn-overview" class="tab-btn active px-8 py-2 uppercase">Dashboard</button>
                <button onclick="switchTab('portfolio')" id="btn-portfolio" class="tab-btn px-8 py-2 uppercase">Portfolio</button>
                <button onclick="switchTab('impact')" id="btn-impact" class="tab-btn px-8 py-2 uppercase">Success Hub</button>
            </nav>

            <button onclick="fetchData()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-xs border-2 border-slate-900 shadow-[4px_4px_0px_#000] active:translate-y-1 transition-all">
                🔄 SYNC & REFRESH
            </button>
        </header>

        <main>
            <section id="tab-overview" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8 text-center" id="summary-stats"></div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bold-card p-8 lg:col-span-1">
                        <h3 class="text-[10px] font-black uppercase mb-6 italic border-b-2 border-slate-100 pb-2">Service Distribution</h3>
                        <div class="h-48 w-full flex justify-center mb-6"><canvas id="donutChart"></canvas></div>
                        <div id="donut-legend" class="space-y-2"></div>
                    </div>
                    <div class="bold-card p-8 lg:col-span-2">
                        <h3 class="text-[10px] font-black uppercase mb-6 italic border-b-2 border-slate-100 pb-2 text-center">Pipeline Overview (Accounts by Stage)</h3>
                        <div class="h-64 w-full"><canvas id="barChart"></canvas></div>
                    </div>
                </div>
            </section>

            <section id="tab-portfolio" class="tab-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="stage-col"><h3 class="font-black text-[10px] uppercase mb-4 italic flex justify-between">01. Leads <span id="cnt-leads">0</span></h3><div id="leads" class="min-h-[400px]"></div></div>
                    <div class="stage-col"><h3 class="font-black text-[10px] uppercase mb-4 italic text-blue-600 flex justify-between">02. Pitching <span id="cnt-pitching">0</span></h3><div id="pitching" class="min-h-[400px]"></div></div>
                    <div class="stage-col"><h3 class="font-black text-[10px] uppercase mb-4 italic text-amber-600 flex justify-between">03. Implement <span id="cnt-implement">0</span></h3><div id="implement" class="min-h-[400px]"></div></div>
                    <div class="stage-col bg-emerald-50/20"><h3 class="font-black text-[10px] uppercase mb-4 italic text-emerald-600 flex justify-between">04. Ongoing <span id="cnt-ongoing">0</span></h3><div id="ongoing" class="min-h-[400px]"></div></div>
                </div>
            </section>

            <section id="tab-impact" class="tab-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="impact-grid"></div>
            </section>
        </main>
    </div>

    <script>
        // ล็อก URL ของพี่ไว้ถาวร
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vShtYYTaN6FAnvYPCBriBIY7D9Wgbr5pLDE1FzuNVsi8ByMMZ6CMNZNknkca1DkU3hRDyg5xNvX5Kxs/pub?output=csv'; 
        
        let clients = [];
        let chart1, chart2;
        const STAGES = ['leads', 'pitching', 'implement', 'ongoing'];

        async function fetchData() {
            try {
                const response = await fetch(`${SHEET_URL}&t=${new Date().getTime()}`);
                const csvData = await response.text();
                Papa.parse(csvData, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        clients = results.data.map((row, idx) => ({
                            id: `b-${idx}`,
                            name: row.Name || 'Account',
                            industry: row.Industry || 'Industry',
                            intent: row.Intent || 'Interested',
                            service: row.ServiceType || 'Marketing Automation',
                            strategy: row.Strategy || 'Strategy',
                            stage: (row.Stage || 'leads').toLowerCase().trim(),
                            impact: parseInt(row.Impact) || 0,
                            results: row.Results ? row.Results.split('|').map(r => r.trim()) : []
                        }));
                        renderAll();
                    }
                });
            } catch (err) { console.error("Sync Failed"); }
        }

        function renderAll() { renderSummary(); renderKanban(); renderImpact(); }

        function renderSummary() {
            const total = clients.length;
            const autoCount = clients.filter(c => c.service === 'Marketing Automation').length;
            const successCount = clients.filter(c => c.service === 'Customer Success Program').length;

            document.getElementById('summary-stats').innerHTML = `
                <div class="bold-card p-6 text-center"><p class="text-[9px] font-bold text-slate-400 uppercase">Total Portfolio</p><h2 class="text-4xl font-black">${total}</h2></div>
                <div class="bold-card p-6 border-b-4 border-blue-600 text-center"><p class="text-[9px] font-bold text-blue-600 uppercase">Marketing Automation</p><h2 class="text-4xl font-black text-blue-600">${autoCount}</h2></div>
                <div class="bold-card p-6 border-b-4 border-slate-900 text-center"><p class="text-[9px] font-bold text-slate-900 uppercase text-xs">Customer Success Program</p><h2 class="text-4xl font-black">${successCount}</h2></div>
            `;

            // 1. Donut Chart
            if(chart1) chart1.destroy();
            chart1 = new Chart(document.getElementById('donutChart'), {
                type: 'doughnut',
                data: { 
                    labels: ['Marketing Automation', 'Customer Success Program'], 
                    datasets: [{ data: [autoCount, successCount], backgroundColor: ['#2563eb', '#0f172a'], borderWidth: 4, borderColor: '#ffffff' }] 
                },
                options: { cutout: '70%', plugins: { legend: { display: false } } }
            });
            document.getElementById('donut-legend').innerHTML = `
                <div class="flex justify-between items-center text-[11px] font-black p-3 bg-blue-50 rounded-xl border-l-4 border-blue-600">
                    <span>Automation</span><span>${autoCount} (${total ? Math.round((autoCount/total)*100) : 0}%)</span>
                </div>
                <div class="flex justify-between items-center text-[11px] font-black p-3 bg-slate-50 rounded-xl border-l-4 border-slate-900">
                    <span>CS Program</span><span>${successCount} (${total ? Math.round((successCount/total)*100) : 0}%)</span>
                </div>
            `;

            // 2. Bar Chart (Pipeline) - คืนชีพตามสั่ง
            if(chart2) chart2.destroy();
            const barData = STAGES.map(s => clients.filter(c => c.stage === s).length);
            chart2 = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: { 
                    labels: STAGES.map(s => s.toUpperCase()), 
                    datasets: [{ data: barData, backgroundColor: ['#0f172a', '#2563eb', '#f59e0b', '#10b981'], borderRadius: 5 }] 
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 } } } }
                },
                plugins: [{
                    afterDatasetsDraw(chart) {
                        const {ctx} = chart; ctx.textAlign = 'center'; ctx.font = 'bold 12px Plus Jakarta Sans';
                        chart.getDatasetMeta(0).data.forEach((bar, i) => {
                            ctx.fillStyle = '#0f172a'; 
                            ctx.fillText(`${barData[i]} (${total ? Math.round((barData[i]/total)*100) : 0}%)`, bar.x, bar.y - 12);
                        });
                    }
                }]
            });
        }

        function renderKanban() {
            STAGES.forEach(s => {
                const container = document.getElementById(s);
                document.getElementById(`cnt-${s}`).innerText = clients.filter(c => c.stage === s).length;
                container.innerHTML = '';
                clients.filter(c => c.stage === s).forEach(c => {
                    container.innerHTML += `
                        <div class="compact-card" data-id="${c.id}">
                            <span class="service-tag w-fit mb-2 block font-black">${c.service}</span>
                            <h4 contenteditable="true" class="font-bold text-slate-900 text-[11px] mb-1 leading-tight underline decoration-slate-200">${c.name}</h4>
                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">${c.industry}</p>
                        </div>
                    `;
                });
            });
            initSortable();
        }

        function initSortable() {
            STAGES.forEach(stage => {
                new Sortable(document.getElementById(stage), { group: 'pipeline', animation: 200, onEnd: (evt) => {
                    const client = clients.find(c => c.id === evt.item.dataset.id);
                    if (client) { client.stage = evt.to.id; renderSummary(); renderImpact(); }
                }});
            });
        }

        function renderImpact() {
            const grid = document.getElementById('impact-grid');
            const ongoingClients = clients.filter(c => c.stage === 'ongoing');
            grid.innerHTML = ongoingClients.map(c => `
                <div class="bold-card p-5 flex flex-col h-full border-l-4 border-l-emerald-500">
                    <div class="absolute top-0 right-0 bg-slate-900 text-white px-2 py-1 font-black text-[7px] uppercase rounded-bl-lg">${c.service}</div>
                    <div class="flex justify-between items-start mb-5 pt-3">
                         <div class="flex-1">
                            <h4 contenteditable="true" class="font-black text-slate-900 text-lg uppercase tracking-tighter mb-1">${c.name}</h4>
                            <p contenteditable="true" class="text-[8px] font-bold text-blue-600 uppercase tracking-widest">${c.industry} | ${c.strategy}</p>
                         </div>
                         <div class="text-right border-2 border-slate-900 px-2 py-1 rounded-lg bg-slate-50 min-w-[55px]">
                            <span class="text-[7px] font-black block leading-none mb-1 uppercase">Impact</span>
                            <span contenteditable="true" class="text-xl font-black">${c.impact}%</span>
                         </div>
                    </div>
                    <div class="flex-1 space-y-1.5 border-t border-slate-100 pt-4">
                        ${c.results.map(r => `<div contenteditable="true" class="result-line">"${r}"</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
